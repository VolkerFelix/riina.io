<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riina.io - Coming Soon</title>
    <style>
        :root {
            --bg-overlay: rgba(7, 12, 22, 0.58);
            --panel: rgba(7, 12, 22, 0.42);
            --panel-border: rgba(255, 255, 255, 0.14);
            --text-main: #f5f7fb;
            --text-soft: rgba(245, 247, 251, 0.8);
            --accent-a: #ff8a5b;
            --accent-b: #5eead4;
            --accent-c: #7dd3fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
            height: 100vh;
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)),
                        url('assets/riina_bg_nologo.jpeg') center/cover no-repeat;
            color: var(--text-main);
            overflow: hidden;
        }

        .page {
            min-height: 100vh;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .topbar a {
            color: var(--text-main);
            text-decoration: none;
            padding: 0.7rem 1rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(12px);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .topbar a:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.18);
        }

        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            background: var(--panel);
            border-radius: 20px;
            backdrop-filter: blur(14px);
            border: 1px solid var(--panel-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, var(--accent-a), var(--accent-b), var(--accent-c), #c4f1be);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease-in-out infinite;
        }

        .coming-soon {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            letter-spacing: 2px;
        }

        .description {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: var(--text-soft);
            line-height: 1.6;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 0.85rem;
            flex-wrap: wrap;
            margin-top: 1.75rem;
        }

        .links a {
            color: var(--text-main);
            text-decoration: none;
            padding: 0.85rem 1.2rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .links a:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.16);
        }

        .loading-dots {
            display: inline-block;
            margin-top: 1rem;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes gradientShift {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes dots {
            0%, 20% {
                content: '';
            }
            40% {
                content: '.';
            }
            60% {
                content: '..';
            }
            80%, 100% {
                content: '...';
            }
        }

        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-element {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .floating-element:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-element:nth-child(2) {
            width: 60px;
            height: 60px;
            top: 60%;
            right: 15%;
            animation-delay: 2s;
        }

        .floating-element:nth-child(3) {
            width: 100px;
            height: 100px;
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
                opacity: 0.7;
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
                opacity: 0.3;
            }
        }

        @media (max-width: 768px) {
            .page {
                padding: 1rem;
            }

            .container {
                margin: 1rem 0;
                padding: 1.5rem;
            }
            
            .logo {
                font-size: 2.5rem;
            }
            
            .coming-soon {
                font-size: 1.2rem;
            }
            
            .description {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="floating-elements">
            <div class="floating-element"></div>
            <div class="floating-element"></div>
            <div class="floating-element"></div>
        </div>

        <nav class="topbar" aria-label="Primary">
            <div style="display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:flex-end;">
                <a href="privacy.html">Privacy</a>
                <a href="account-deletion.html">Delete account</a>
            </div>
        </nav>

        <main class="hero">
            <div class="container">
                <h1 class="logo">Riina.io</h1>
                <h2 class="coming-soon">Coming Soon</h2>
                <p class="description">
                    Riina turns real workouts into game action. While the full experience is still on the way,
                    you can already review how workout, route, profile, social, and analytics data are used.
                </p>
                <div class="loading-dots">Stay tuned</div>
                <div class="links">
                    <a href="privacy.html">Read the Privacy Statement</a>
                    <a href="account-deletion.html">Request account deletion</a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
